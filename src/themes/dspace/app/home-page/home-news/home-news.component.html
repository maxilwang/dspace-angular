<!-- BANNER IMAGE ONLY -->
<div class="background-image-container mt-ncs">
  <picture class="background-image">
    <source type="image/webp"
      srcset="
        assets/dspace/images/banner.webp 2000w,
        assets/dspace/images/banner-half.webp 1200w,
        assets/dspace/images/banner-tall.webp 768w
      ">
    <source type="image/jpg"
      srcset="
        assets/dspace/images/banner.jpg 2000w,
        assets/dspace/images/banner-half.jpg 1200w,
        assets/dspace/images/banner-tall.jpg 768w
      ">
    <img alt="" [src]="'assets/dspace/images/banner.jpg'" />
  </picture>

  <small class="credits">
    Photo by
    <a href="https://www.pexels.com/@inspiredimages">&#64;inspiredimages</a>
  </small>
</div>

<!-- TEXT BELOW IMAGE -->
<div class="home-news-text container">
  <ds-text-section
    *ngIf="hasHomeNewsMetadata; else dsDefaultHomeNews"
    [sectionId]="'site'"
    [textRowSection]="homeNewsSection"
    [site]="(site$ | async)">
  </ds-text-section>
</div>

<!-- DEFAULT TEXT -->
<ng-template #dsDefaultHomeNews>
  <div class="home-news-text container">
    <div class="d-flex flex-wrap">
      <div>
        <br/>
        <p class="lead">
          The Cape Peninsula University of Technology (CPUT) Electronic Theses
          and Dissertations (ETD) repository holds full-text theses and
          dissertations submitted for higher degrees at the University,
          including submissions from the former Cape Technikon and Peninsula
          Technikon.
        </p>
      </div>
    </div>
  </div>
</ng-template>
